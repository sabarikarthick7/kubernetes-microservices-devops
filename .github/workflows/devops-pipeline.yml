name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build User Service
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service ./services/user-service

    - name: Build Product Service
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/product-service ./services/product-service

    - name: Build Order Service
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service ./services/order-service

    - name: Build Notification Service
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service ./services/notification-service

    - name: Push Images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/user-service
        docker push ${{ secrets.DOCKER_USERNAME }}/product-service
        docker push ${{ secrets.DOCKER_USERNAME }}/order-service
        docker push ${{ secrets.DOCKER_USERNAME }}/notification-service

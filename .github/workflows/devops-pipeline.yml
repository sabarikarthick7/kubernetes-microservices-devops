name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Docker Images
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service ./services/user-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/product-service ./services/product-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service ./services/order-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service ./services/notification-service

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Run Tests
      run: echo "Running microservice tests..."

  push:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login Docker Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push Docker Images
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service ./services/user-service
        docker push ${{ secrets.DOCKER_USERNAME }}/user-service

        docker build -t ${{ secrets.DOCKER_USERNAME }}/product-service ./services/product-service
        docker push ${{ secrets.DOCKER_USERNAME }}/product-service

        docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service ./services/order-service
        docker push ${{ secrets.DOCKER_USERNAME }}/order-service

        docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service ./services/notification-service
        docker push ${{ secrets.DOCKER_USERNAME }}/notification-service

  deploy:
    runs-on: ubuntu-latest
    needs: push

    steps:
    - name: Deploy to Kubernetes
      run: echo "Deploying services to Kubernetes cluster..."
